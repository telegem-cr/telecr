name: telecr
version: 0.1.0

authors:
  - slick_phantom

crystal: ">= 1.0.0, < 2.0.0"

license: MIT

description: |
  Telegram bot framework for Crystal.
  Full Telegram Bot API support with middleware system,
  sessions, rate limiting, file uploads, and webhooks.

dependencies:
  # No external dependencies - uses Crystal stdlib

development_dependencies:
  ameba:
    github: crystal-ameba/ameba
    version: ~> 1.6.0
  spectator:
    gitlab: arctic-fox/spectator
    version: ~> 0.11.0
  webmock:
    github: manastech/webmock.cr
    version: ~> 0.14.0
